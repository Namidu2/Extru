name: Build and Release EXE

on:
  push:
    tags:
      - 'v*' # Trigger on tags starting with 'v', e.g., v1.0.0

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # Needed to create a release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Or whichever version you prefer

      - name: Install dependencies
        working-directory: ./checkers-updated
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Build EXE with PyInstaller
        working-directory: ./checkers-updated
        run: |
          # Use the existing spec file to build the EXE
          pyinstaller build_exe.spec

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: checkers-updated/dist/Checkers.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
